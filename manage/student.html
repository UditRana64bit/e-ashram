<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; }
        .result { margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Check Your Fees</h2>
        <input type="text" id="rollInput" placeholder="Enter Roll Number">
        <button onclick="checkFees()" style="width:100%;" class="btn">View Details</button>

        <div id="resultBox" class="result">
            <h3 id="studentName"></h3>
            <p>Total: <span id="tFee"></span></p>
            <p>Paid: <span id="pFee"></span></p>
            <h2 style="color:#ef4444">Balance: <span id="bFee"></span></h2>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkFees() {
            const roll = document.getElementById('rollInput').value;
            const { data, error } = await supabase
                .from('students')
                .select('*')
                .eq('roll_number', roll)
                .single();

            if (data) {
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('studentName').innerText = data.name;
                document.getElementById('tFee').innerText = '₹' + data.total_fee;
                document.getElementById('pFee').innerText = '₹' + data.paid_amount;
                document.getElementById('bFee').innerText = '₹' + (data.total_fee - data.paid_amount);
            } else {
                alert("Roll number not found!");
            }
        }
    </script>
</body>
</html>
