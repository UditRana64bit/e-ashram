<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --danger: #ef4444; --success: #10b981; --text: #ffffff; 
            --purple: #8b5cf6;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; 
            padding: 10px; 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: auto; padding: 10px; }
        .hidden { display: none !important; }

        /* HEADER & TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin: 0; }

        /* RESPONSIVE TABLE CONTAINER */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* Enables horizontal scroll on mobile */
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 600px; /* Prevents table from squishing too much */
        }

        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
            font-size: 0.9rem;
        }

        th { background: var(--accent); color: white; text-transform: uppercase; font-size: 0.75rem; }

        /* BUTTONS */
        .btn { 
            border: none; 
            padding: 10px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            color: white; 
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn-green { background: var(--success); }
        .btn-purple { background: var(--purple); }
        .btn-danger { background: var(--danger); }
        .btn-blue { background: var(--accent); width: 100%; }

        /* MODALS RESPONSIVENESS */
        .modal-content { 
            background: var(--card); 
            margin: 15% auto; 
            padding: 25px; 
            width: 90%; 
            max-width: 400px; 
            border-radius: 16px; 
            box-sizing: border-box;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem;
        }

        /* MOBILE SPECIFIC ADJUSTMENTS */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .btn { width: 100%; justify-content: center; }
            th, td { padding: 10px; font-size: 0.8rem; }
            .modal-content { margin: 20% auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" style="max-width: 350px; margin: 100px auto; text-align: center;">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn btn-blue" onclick="checkAdminLogin()">Login</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="top-bar">
            <h1>Admin Panel</h1>
            <button class="btn btn-green" onclick="showModal('studentModal')">＋ Add Student</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Paid</th>
                        <th>Due</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const _client = supabase.createClient('https://yicuzlvmpqrutcjnnccj.supabase.co', 'sb_publishable_xeIlW4AP8kbSTKwZCcAkgg_sAH-7N7A');
    
    let activeRoll = ''; 
    let activePaid = 0;

    // --- LOGIN LOGIC ---
    function checkAdminLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "1234") { // Change this to your desired admin password
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadStudents();
        } else {
            alert("Access Denied: Incorrect Password");
        }
    }

    // --- LOAD DATA ---
    async function loadStudents() {
        const { data, error } = await _client.from('students').select('*').order('name', { ascending: true });
        
        if (error) {
            console.error(error);
            return;
        }

        const list = document.getElementById('studentList');
        list.innerHTML = data.map(s => `
            <tr>
                <td>${s.name}</td>
                <td>${s.roll_number}</td>
                <td>₹${s.total_fee}</td>
                <td>₹${s.paid_amount}</td>
                <td style="color:var(--danger); font-weight:bold;">₹${s.total_fee - s.paid_amount}</td>
                <td>
                    <button class="btn btn-green" style="padding: 6px 12px; font-size: 12px;" onclick="openPayModal('${s.roll_number}', '${s.name}', ${s.paid_amount})">₹ Pay</button>
                    <button class="btn btn-purple" style="padding: 6px 12px; font-size: 12px;" onclick="viewHistory('${s.roll_number}', '${s.name}')">📜 History</button>
                    <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteStudent('${s.roll_number}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    // --- MODAL CONTROLS ---
    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeAll() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none'); 
        // Reset forms
        document.querySelectorAll('input').forEach(i => { if(i.id !== 'adminPass') i.value = ''; });
    }

    // --- ADD STUDENT ---
    async function addStudent() {
        const name = document.getElementById('newSName').value;
        const roll = document.getElementById('newSRoll').value;
        const pass = document.getElementById('newSPass').value;
        const total = document.getElementById('newSTotal').value;

        if(!name || !roll || !pass || !total) return alert("All fields are required!");

        const { error } = await _client.from('students').insert([{ 
            name, 
            roll_number: roll, 
            password: pass, 
            total_fee: parseInt(total), 
            paid_amount: 0 
        }]);

        if(error) alert("Error: " + error.message);
        else {
            alert("Student Registered Successfully!");
            closeAll();
            loadStudents();
        }
    }

    // --- RECORD PAYMENT ---
    function openPayModal(roll, name, paid) {
        activeRoll = roll; 
        activePaid = paid;
        document.getElementById('payFor').innerText = "Student: " + name;
        showModal('payModal');
    }

    async function submitPayment() {
        const amt = document.getElementById('payAmt').value;
        const mode = document.getElementById('payMode').value;

        if(!amt || amt <= 0) return alert("Enter a valid amount");

        // 1. Update Student's total paid amount
        const { error: upError } = await _client
            .from('students')
            .update({ paid_amount: activePaid + parseInt(amt) })
            .eq('roll_number', activeRoll);

        if(upError) return alert("Error: " + upError.message);

        // 2. Log to history table
        await _client.from('fee_history').insert([{ 
            student_roll: activeRoll, 
            amount: parseInt(amt), 
            remarks: mode 
        }]);

        alert("Payment Recorded!");
        closeAll();
        loadStudents();
    }

    // --- VIEW HISTORY ---
    async function viewHistory(roll, name) {
        document.getElementById('histTitle').innerText = "History: " + name;
        const { data, error } = await _client
            .from('fee_history')
            .select('*')
            .eq('student_roll', roll)
            .order('created_at', { ascending: false });

        const body = document.getElementById('histBody');
        if (data && data.length > 0) {
            body.innerHTML = data.map(h => `
                <tr>
                    <td>${new Date(h.created_at).toLocaleDateString()}</td>
                    <td style="color:var(--success); font-weight:bold;">+ ₹${h.amount}</td>
                    <td>${h.remarks}</td>
                </tr>
            `).join('');
        } else {
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px;">No transaction records found.</td></tr>';
        }
        showModal('historyModal');
    }

    // --- DELETE STUDENT ---
    async function deleteStudent(roll) {
        if(confirm("Are you sure? This will delete the student and their records permanently.")) {
            const { error } = await _client.from('students').delete().eq('roll_number', roll);
            if(error) alert(error.message);
            else loadStudents();
        }
    }

    // Close modal if user clicks outside of it
    window.onclick = function(event) {
        if (event.target.className === 'modal') closeAll();
    }
</script>
</body>
</html>
