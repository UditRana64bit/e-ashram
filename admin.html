<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --danger: #ef4444; --success: #10b981; --text: #ffffff; 
            --purple: #8b5cf6;
        }
        body { background: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; padding: 10px; }
        .hidden { display: none !important; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .table-wrap { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background: var(--accent); color: white; text-transform: uppercase; font-size: 12px; }
        .btn { border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-green { background: var(--success); }
        .btn-blue { background: var(--accent); }
        .btn-purple { background: var(--purple); }
        .btn-danger { background: var(--danger); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 90%; max-width: 450px; border-radius: 15px; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        .status-due { color: var(--danger); font-weight: bold; }
        .status-paid { color: var(--success); font-weight: bold; }
        @media (max-width: 600px) { .top-bar { flex-direction: column; align-items: stretch; } .btn { width: 100%; justify-content: center; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" style="text-align: center; margin-top: 100px;">
        <div style="background: var(--card); padding: 40px; border-radius: 20px; display: inline-block; width: 100%; max-width: 350px; box-sizing: border-box;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn btn-blue" style="width: 100%;" onclick="checkAdminLogin()">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="top-bar">
            <h1>Admin Panel</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-green" onclick="showModal('studentModal')">＋ Add Student</button>
                <button class="btn btn-blue" onclick="window.location.href='index.html'">Back to Home</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name & Roll</th>
                        <th>Course</th>
                        <th>Monthly Fee</th>
                        <th>Status (Paid/Total)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3>Register New Student</h3>
        <input type="text" id="newSName" placeholder="Full Name">
        <input type="text" id="newSRoll" placeholder="Roll Number">
        <input type="password" id="newSPass" placeholder="Set Password">
        <input type="text" id="newSCourse" placeholder="Course Name">
        <input type="text" id="newSContact" placeholder="Contact Number">
        <input type="number" id="newSMonthFee" placeholder="Monthly Fee (₹)">
        <label style="font-size:12px; color:#94a3b8;">Joining Date:</label>
        <input type="date" id="newSJoinDate">
        <button class="btn btn-blue" style="width: 100%;" onclick="addStudent()">Save Student</button>
        <button class="btn" style="background: #334155; width: 100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Add Payment</h3>
        <p id="payFor" style="font-weight: bold; color: var(--accent);"></p>
        <input type="number" id="payAmt" placeholder="Amount (₹)">
        <select id="payMode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>
        <button class="btn btn-green" style="width: 100%;" onclick="submitPayment()">Submit Payment</button>
        <button class="btn" style="background: #334155; width: 100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content" style="max-width: 550px;">
        <h3 id="histTitle">Payment History</h3>
        <div class="table-wrap" style="box-shadow: none;">
            <table style="min-width: 100%;">
                <thead>
                    <tr style="background: #334155;"><th>Date</th><th>Txn No.</th><th>Amount</th><th>Mode</th></tr>
                </thead>
                <tbody id="histBody"></tbody>
            </table>
        </div>
        <button class="btn" style="background: #334155; width: 100%; margin-top: 20px;" onclick="closeAll()">Close</button>
    </div>
</div>

<script>
    const _client = supabase.createClient('https://yicuzlvmpqrutcjnnccj.supabase.co', 'sb_publishable_xeIlW4AP8kbSTKwZCcAkgg_sAH-7N7A');
    let activeRoll = ''; let activePaid = 0;

    function checkAdminLogin() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadStudents();
        } else { alert("Wrong Password"); }
    }

    async function loadStudents() {
        const { data } = await _client.from('students').select('*').order('name');
        const now = new Date();

        document.getElementById('studentList').innerHTML = data.map(s => {
            // MONTHLY CALCULATION LOGIC
            const joinDate = new Date(s.created_at || now);
            const monthsElapsed = (now.getFullYear() - joinDate.getFullYear()) * 12 + (now.getMonth() - joinDate.getMonth()) + 1;
            const monthsPaid = Math.floor((s.paid_amount || 0) / s.monthly_fee);
            const isDue = monthsPaid < monthsElapsed;

            return `
                <tr>
                    <td><b>${s.name}</b><br><small>${s.roll_number}</small></td>
                    <td>${s.course || '-'}</td>
                    <td>₹${s.monthly_fee}/mo</td>
                    <td>
                        <span class="${isDue ? 'status-due' : 'status-paid'}">
                            ${monthsPaid} / ${monthsElapsed} Months Paid
                        </span>
                    </td>
                    <td>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                            <button class="btn btn-green" onclick="openPay('${s.roll_number}', '${s.name}', ${s.paid_amount})">Pay</button>
                            <button class="btn btn-purple" onclick="viewHistory('${s.roll_number}', '${s.name}')">History</button>
                            <button class="btn btn-danger" onclick="deleteStudent('${s.roll_number}')">Del</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    async function addStudent() {
        const name = document.getElementById('newSName').value;
        const roll = document.getElementById('newSRoll').value;
        const pass = document.getElementById('newSPass').value;
        const course = document.getElementById('newSCourse').value;
        const contact = document.getElementById('newSContact').value;
        const mFee = document.getElementById('newSMonthFee').value;
        const jDate = document.getElementById('newSJoinDate').value || new Date().toISOString();
        
        const { error } = await _client.from('students').insert([{ 
            name, roll_number: roll, password: pass, course, contact, 
            monthly_fee: parseInt(mFee), paid_amount: 0, created_at: new Date(jDate).toISOString() 
        }]);
        
        if(error) alert(error.message); else { closeAll(); loadStudents(); }
    }

    function openPay(roll, name, paid) {
        activeRoll = roll; activePaid = paid;
        document.getElementById('payFor').innerText = "Student: " + name;
        showModal('payModal');
    }

    async function submitPayment() {
        const amtInput = document.getElementById('payAmt').value.trim();
        if(!amtInput) { alert('Enter amount first'); return; }
        const amt = parseInt(amtInput);
        const mode = document.getElementById('payMode').value;
        const txn = 'TX' + Date.now().toString().slice(-6);

        const { error: updErr } = await _client.from('students').update({ paid_amount: activePaid + amt }).eq('roll_number', activeRoll);
        
        if(updErr) { alert('Update error: ' + updErr.message); return; }

        await _client.from('fee_history').insert([{ student_roll: activeRoll, amount: amt, remarks: mode, txn_no: txn }]);
        
        alert("Success"); closeAll(); loadStudents();
    }

    async function viewHistory(roll, name) {
        document.getElementById('histTitle').innerText = "History: " + name;
        const { data, error } = await _client.from('fee_history').select('*').eq('student_roll', roll).order('created_at', {ascending: false});
        
        document.getElementById('histBody').innerHTML = (data && data.length > 0) ? data.map(h => `
            <tr>
                <td>${new Date(h.created_at).toLocaleDateString()}</td>
                <td>${h.txn_no || '-'}</td>
                <td>₹${h.amount}</td>
                <td>${h.remarks || 'N/A'}</td>
            </tr>
        `).join('') : '<tr><td colspan="4" style="text-align:center;">No records</td></tr>';
        
        showModal('historyModal');
    }

    async function deleteStudent(roll) {
        if(confirm("Delete student?")) { 
            await _client.from('students').delete().eq('roll_number', roll); 
            loadStudents(); 
        }
    }
</script>
</body>
</html>
