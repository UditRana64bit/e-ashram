<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --danger: #ef4444; --success: #10b981; --text: #ffffff; }
        body { background: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        .hidden { display: none !important; }
        
        /* Responsive Table */
        .table-wrap { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background: var(--accent); color: white; }

        /* Buttons */
        .btn { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        .btn-green { background: var(--success); }
        .btn-blue { background: var(--accent); }
        .btn-danger { background: var(--danger); }
        
        /* Modals */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 90%; max-width: 400px; border-radius: 15px; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        @media (max-width: 600px) { .btn { width: 100%; margin-bottom: 5px; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" style="text-align: center; margin-top: 100px;">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" style="max-width:300px" placeholder="Password">
        <br><button class="btn btn-blue" style="width:100%; max-width:300px" onclick="checkAdminLogin()">Login</button>
    </div>

    <div id="dashboard" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h1>Management</h1>
            <button class="btn btn-green" onclick="showModal('studentModal')">+ Add Student</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Name</th><th>Paid</th><th>Due</th><th>Actions</th></tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3>New Student</h3>
        <input type="text" id="newSName" placeholder="Full Name">
        <input type="text" id="newSRoll" placeholder="Roll No">
        <input type="password" id="newSPass" placeholder="Login Password">
        <input type="number" id="newSTotal" placeholder="Total Fee (e.g. 5000)">
        <button class="btn btn-blue" onclick="addStudent()">Save Student</button>
        <button class="btn" style="background:#444; width:100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Record Payment</h3>
        <p id="payFor" style="font-weight: bold; color: var(--accent);"></p>
        <input type="number" id="payAmt" placeholder="Amount (₹)">
        <select id="payMode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Online">Online</option>
        </select>
        <button class="btn btn-green" style="width:100%" onclick="submitPayment()">Submit</button>
        <button class="btn" style="background:#444; width:100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<script>
    // RENAMED TO AVOID CONFLICTS
    const _adminclient = supabase.createClient('https://yicuzlvmpqrutcjnnccj.supabase.co', 'sb_publishable_xeIlW4AP8kbSTKwZCcAkgg_sAH-7N7A');
    let activeRoll = '';
    let activePaid = 0;

    function checkAdminLogin() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadStudents();
        } else { alert("Incorrect Password"); }
    }

    async function loadStudents() {
        const { data, error } = await _adminClient.from('students').select('*').order('name');
        if(error) return console.error(error);

        const list = document.getElementById('studentList');
        list.innerHTML = data.map(s => `
            <tr>
                <td>${s.name}<br><small>${s.roll_number}</small></td>
                <td>₹${s.paid_amount}</td>
                <td style="color:var(--danger); font-weight:bold;">₹${s.total_fee - s.paid_amount}</td>
                <td>
                    <button class="btn btn-green" onclick="openPay('${s.roll_number}', '${s.name}', ${s.paid_amount})">Pay</button>
                    <button class="btn btn-danger" onclick="deleteStudent('${s.roll_number}')">Del</button>
                </td>
            </tr>
        `).join('');
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    async function addStudent() {
        const name = document.getElementById('newSName').value;
        const roll = document.getElementById('newSRoll').value;
        const pass = document.getElementById('newSPass').value;
        const total = document.getElementById('newSTotal').value;

        const { error } = await _adminClient.from('students').insert([{ 
            name, roll_number: roll, password: pass, total_fee: parseInt(total), paid_amount: 0 
        }]);

        if(error) alert(error.message);
        else { alert("Added!"); closeAll(); loadStudents(); }
    }

    function openPay(roll, name, paid) {
        activeRoll = roll; activePaid = paid;
        document.getElementById('payFor').innerText = name;
        showModal('payModal');
    }

    async function submitPayment() {
        const amt = document.getElementById('payAmt').value;
        const mode = document.getElementById('payMode').value;
        
        await _adminClient.from('students').update({ paid_amount: activePaid + parseInt(amt) }).eq('roll_number', activeRoll);
        await _adminClient.from('fee_history').insert([{ student_roll: activeRoll, amount: amt, remarks: mode }]);
        
        alert("Payment Added!"); closeAll(); loadStudents();
    }

    async function deleteStudent(roll) {
        if(confirm("Delete student?")) {
            await _adminClient.from('students').delete().eq('roll_number', roll);
            loadStudents();
        }
    }
</script>
</body>
</html>
