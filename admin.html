<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --danger: #ef4444; --success: #10b981; --text: #ffffff; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Layout & Table */
        .input-group { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: var(--accent); color: white; font-size: 12px; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; }
        .btn-blue { background: var(--accent); }
        .btn-purple { background: #8b5cf6; }
        .btn-danger { background: var(--danger); }
        .pay-input { width: 70px; padding: 8px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 4px; }

        /* --- MODAL STYLES --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card); margin: 10% auto; padding: 25px; 
            width: 50%; border-radius: 15px; box-shadow: 0 5px 30px rgba(0,0,0,0.5);
            position: relative; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #94a3b8; }
        .history-table { width: 100%; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fee Management System</h1>
    
    <div class="input-group">
        <input type="text" id="sName" placeholder="Student Name">
        <input type="text" id="sRoll" placeholder="Roll No">
        <input type="number" id="sTotal" placeholder="Total Fee">
        <button class="btn btn-blue" onclick="addStudent()">+ Add Student</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Total</th>
                <th>Paid</th>
                <th>Balance</th>
                <th>Quick Pay</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Payment History</h2>
        <table class="history-table">
            <thead>
                <tr style="background: #334155;">
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Method</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _client = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

    async function loadStudents() {
        const { data } = await _client.from('students').select('*').order('name');
        const list = document.getElementById('list');
        list.innerHTML = data.map(s => `
            <tr>
                <td>${s.name}</td>
                <td>${s.roll_number}</td>
                <td>₹${s.total_fee}</td>
                <td>₹${s.paid_amount}</td>
                <td style="color:var(--danger); font-weight:bold;">₹${s.total_fee - s.paid_amount}</td>
                <td>
                    <input type="number" id="pay_${s.roll_number}" class="pay-input" placeholder="₹">
                    <button class="btn btn-blue" style="padding: 8px;" onclick="updatePayment('${s.roll_number}', ${s.paid_amount})">Pay</button>
                </td>
                <td>
                    <button class="btn btn-purple" onclick="viewHistory('${s.roll_number}', '${s.name}')">📜 History</button>
                    <button class="btn btn-danger" onclick="deleteStudent('${s.roll_number}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    async function updatePayment(roll, currentPaid) {
        const amount = document.getElementById(`pay_${roll}`).value;
        if (!amount || amount <= 0) return alert("Invalid amount");

        const newTotal = parseInt(currentPaid) + parseInt(amount);

        // Update Student Table
        await _client.from('students').update({ paid_amount: newTotal }).eq('roll_number', roll);
        
        // Add to History Table
        await _client.from('fee_history').insert([{ student_roll: roll, amount: parseInt(amount), remarks: "Fee Deposit" }]);

        alert("Payment Added!");
        loadStudents();
    }

    async function viewHistory(roll, name) {
        document.getElementById('modalTitle').innerText = `History: ${name}`;
        const { data } = await _client.from('fee_history').select('*').eq('student_roll', roll).order('created_at', { ascending: false });

        const hBody = document.getElementById('historyBody');
        hBody.innerHTML = data.length ? data.map(h => `
            <tr>
                <td>${new Date(h.created_at).toLocaleDateString()}</td>
                <td style="color:var(--success)">+ ₹${h.amount}</td>
                <td>${h.remarks}</td>
            </tr>
        `).join('') : '<tr><td colspan="3" style="text-align:center;">No records found</td></tr>';

        document.getElementById('historyModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
    window.onclick = function(event) { if (event.target == document.getElementById('historyModal')) closeModal(); }

    async function addStudent() {
        const name = document.getElementById('sName').value;
        const roll = document.getElementById('sRoll').value;
        const total = document.getElementById('sTotal').value;
        await _client.from('students').insert([{ name, roll_number: roll, total_fee: parseInt(total), paid_amount: 0 }]);
        location.reload();
    }

    async function deleteStudent(roll) {
        if (confirm("Delete this student?")) {
            await _client.from('students').delete().eq('roll_number', roll);
            loadStudents();
        }
    }

    loadStudents();
</script>
</body>
</html>
