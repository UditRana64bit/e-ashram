<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #ffffff; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .hidden { display: none !important; }
        
        /* Table & UI */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: var(--accent); }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        
        /* Modals */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 30px; width: 350px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loginSection" style="text-align: center; margin-top: 150px;">
    <h2>Admin Access</h2>
    <input type="password" id="adminPass" style="width: 250px;" placeholder="Password">
    <br><button class="btn" style="background: var(--accent);" onclick="checkAdminLogin()">Login</button>
</div>

<div id="dashboard" class="hidden container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Student Management</h1>
        <button class="btn" style="background: #10b981;" onclick="showModal('studentModal')">+ New Student</button>
    </div>
    
    <table>
        <thead>
            <tr><th>Name</th><th>Roll No</th><th>Total</th><th>Paid</th><th>Due</th><th>Actions</th></tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3>Register Student</h3>
        <input type="text" id="newSName" placeholder="Full Name">
        <input type="text" id="newSRoll" placeholder="Roll No">
        <input type="password" id="newSPass" placeholder="Login Password">
        <input type="number" id="newSTotal" placeholder="Total Course Fee">
        <button class="btn" style="background: var(--accent); width:100%;" onclick="addStudent()">Save Student</button>
        <button class="btn" style="background: #334155; width:100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Record Payment</h3>
        <p id="payFor" style="color: var(--accent); font-weight: bold;"></p>
        <input type="number" id="payAmt" placeholder="Amount (₹)">
        <select id="payMode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Scholarship">Scholarship</option>
        </select>
        <button class="btn" style="background: #10b981; width:100%;" onclick="submitPayment()">Submit Payment</button>
        <button class="btn" style="background: #334155; width:100%; margin-top:10px;" onclick="closeAll()">Cancel</button>
    </div>
</div>

<script>
    const _client = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');
    let activeRoll = ''; let activePaid = 0;

    function checkAdminLogin() {
        if(document.getElementById('adminPass').value === "1234") { // Change your password here
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadStudents();
        } else { alert("Wrong Password"); }
    }

    async function loadStudents() {
        const { data } = await _client.from('students').select('*').order('name');
        document.getElementById('studentList').innerHTML = data.map(s => `
            <tr>
                <td>${s.name}</td>
                <td>${s.roll_number}</td>
                <td>₹${s.total_fee}</td>
                <td>₹${s.paid_amount}</td>
                <td style="color:var(--danger); font-weight:bold;">₹${s.total_fee - s.paid_amount}</td>
                <td>
                    <button class="btn" style="background:#10b981" onclick="openPay('${s.roll_number}', '${s.name}', ${s.paid_amount})">₹ Pay</button>
                    <button class="btn" style="background:var(--danger)" onclick="deleteStudent('${s.roll_number}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    async function addStudent() {
        const name = document.getElementById('newSName').value;
        const roll = document.getElementById('newSRoll').value;
        const pass = document.getElementById('newSPass').value;
        const total = document.getElementById('newSTotal').value;
        await _client.from('students').insert([{ name, roll_number: roll, password: pass, total_fee: total, paid_amount: 0 }]);
        closeAll(); loadStudents();
    }

    function openPay(roll, name, paid) {
        activeRoll = roll; activePaid = paid;
        document.getElementById('payFor').innerText = "Student: " + name;
        showModal('payModal');
    }

    async function submitPayment() {
        const amt = parseInt(document.getElementById('payAmt').value);
        const mode = document.getElementById('payMode').value;
        await _client.from('students').update({ paid_amount: activePaid + amt }).eq('roll_number', activeRoll);
        await _client.from('fee_history').insert([{ student_roll: activeRoll, amount: amt, remarks: mode }]);
        alert("Payment Recorded!"); closeAll(); loadStudents();
    }

    async function deleteStudent(roll) {
        if(confirm("Delete student and all records?")) {
            await _client.from('students').delete().eq('roll_number', roll);
            loadStudents();
        }
    }
</script>
</body>
</html>
