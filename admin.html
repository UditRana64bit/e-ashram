<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { max-width: 1000px; margin: auto; }
        .input-group { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 10px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: var(--accent); color: white; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin: Student Fee Manager</h1>
        
        <div class="input-group">
            <input type="text" id="sName" placeholder="Student Name">
            <input type="text" id="sRoll" placeholder="Roll No">
            <input type="number" id="sTotal" placeholder="Total Fee">
            <button class="btn" onclick="addStudent()">Add Student</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Total Fee</th>
                    <th>Paid</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
// Renamed to _client to avoid "already declared" error
        const _client = supabase.createClient('https://yicuzlvmpqrutcjnnccj.supabase.co', 'sb_publishable_xeIlW4AP8kbSTKwZCcAkgg_sAH-7N7A');

        // Ensure you use the renamed client to avoid the "already declared" error

        async function loadStudents() {
            const { data, error } = await _client.from('students').select('*').order('name', { ascending: true });
            
            if (error) {
                console.error("Error loading:", error);
                return;
            }
            
            const list = document.getElementById('list');
            list.innerHTML = data.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.roll_number}</td>
                    <td>₹${s.total_fee}</td>
                    <td>₹${s.paid_amount}</td>
                    <td style="color:#ef4444; font-weight:bold;">₹${s.total_fee - s.paid_amount}</td>
                    <td>
                        <input type="number" id="pay_${s.roll_number}" placeholder="Amt" style="width:60px; padding:5px; margin-right:5px;">
                        <button class="btn" style="padding:5px 10px; font-size:11px;" onclick="updatePayment('${s.roll_number}', ${s.paid_amount})">Add</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updatePayment(roll, currentPaid) {
            const amountToAdd = document.getElementById(`pay_${roll}`).value;
            
            if (!amountToAdd || amountToAdd <= 0) {
                alert("Enter a valid amount");
                return;
            }

            const newTotal = parseInt(currentPaid) + parseInt(amountToAdd);

            const { error } = await _client
                .from('students')
                .update({ paid_amount: newTotal })
                .eq('roll_number', roll);

            if (error) {
                alert("Update failed: " + error.message);
            } else {
                alert("Payment Updated!");
                loadStudents(); // Refresh data
            }
        }

        // Initial load
        loadStudents();
    </script>
</body>
</html>
