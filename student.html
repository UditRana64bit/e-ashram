<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; font-size: 1rem; }
        .btn { background: #3b82f6; color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        #info { margin-top: 25px; padding-top: 25px; border-top: 1px solid #334155; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" width="80" alt="Logo">
        <h2>Check Fee Status</h2>
        <input type="text" id="roll" placeholder="Enter Roll Number">
        <button class="btn" onclick="check()">View My Balance</button>

        <div id="info">
            <h3 id="n"></h3>
            <p>Paid: <span id="p"></span></p>
            <h2 style="color:#ef4444">Due: <span id="d"></span></h2>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

        async function check() {
            const roll = document.getElementById('roll').value;
            const { data } = await supabase.from('students').select('*').eq('roll_number', roll).single();
            if(data) {
                document.getElementById('info').style.display = 'block';
                document.getElementById('n').innerText = data.name;
                document.getElementById('p').innerText = "₹" + data.paid_amount;
                document.getElementById('d').innerText = "₹" + (data.total_fee - data.paid_amount);
            } else { alert("Student not found!"); }
        }
    </script>
</body>
</html>
