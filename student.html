<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | e-Ashram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 35px; border-radius: 20px; width: 340px; text-align: center; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div id="loginBox">
        <img src="logo.png" width="60" alt="Logo">
        <h2>Student Login</h2>
        <input type="text" id="sRoll" placeholder="Roll Number">
        <input type="password" id="sPass" placeholder="Password">
        <button class="btn" onclick="login()">Login</button>
    </div>

    <div id="statusBox" class="hidden">
        <h3 id="displayName"></h3>
        <div style="background:#0f172a; padding:15px; border-radius:10px; margin:20px 0;">
            <p style="margin:0; font-size: 14px; opacity:0.7;">Remaining Balance</p>
            <h1 id="displayDue" style="margin:5px 0; color:#ef4444;"></h1>
        </div>
        <input type="number" id="payAmt" placeholder="Enter Amount to Pay">
        <button class="btn" style="background:#10b981;" onclick="payOnline()">Pay Online Now</button>
    </div>
</div>

<script>
    const _client = supabase.createClient('https://yicuzlvmpqrutcjnnccj.supabase.co', 'sb_publishable_xeIlW4AP8kbSTKwZCcAkgg_sAH-7N7A');
    let user = null;

    async function login() {
        const r = document.getElementById('sRoll').value;
        const p = document.getElementById('sPass').value;
        
        // 1. Clear previous errors and show a "loading" state
        console.log("Attempting login for:", r);

        const { data, error } = await _client
            .from('students')
            .select('*')
            .eq('roll_number', r)
            .eq('password', p)
            .maybeSingle(); // Use maybeSingle to prevent crashing if not found

        if (error) {
            console.error("Database error:", error);
            alert("System Error: " + error.message);
            return;
        }

        if (data) {
            user = data;
            // 2. Hide Login and Show Status
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('statusBox').classList.remove('hidden');
            
            // 3. Update the text on the screen
            document.getElementById('displayName').innerText = "Welcome, " + data.name;
            
            const balance = data.total_fee - data.paid_amount;
            document.getElementById('displayDue').innerText = "₹" + balance;
            
            console.log("Login successful!");
        } else {
            alert("Invalid Roll Number or Password. Please try again.");
        }
    }
    function payOnline() {
        const amt = document.getElementById('payAmt').value;
        if(!amt || amt <= 0) return alert("Enter amount");

        var options = {
            "key": "YOUR_RAZORPAY_KEY", 
            "amount": amt * 100,
            "name": "e-Ashram Education",
            "handler": async function (response) {
                // 1. Update Database with "Online Payment" remark
                await _client.from('students').update({ paid_amount: user.paid_amount + parseInt(amt) }).eq('roll_number', user.roll_number);
                await _client.from('fee_history').insert([{ student_roll: user.roll_number, amount: amt, remarks: "Online Payment" }]);
                
                // 2. Generate PDF Receipt
                generateReceipt(amt, response.razorpay_payment_id);

                alert("Payment Successful!");
                location.reload();
            }
        };
        new Razorpay(options).open();
    }

    function generateReceipt(amount, txid) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22); doc.text("E-ASHRAM COMPUTER EDUCATION", 20, 30);
        doc.setFontSize(14); doc.text("FEE PAYMENT RECEIPT", 20, 45);
        doc.text("------------------------------------------", 20, 50);
        doc.text(`Student Name: ${user.name}`, 20, 65);
        doc.text(`Roll Number: ${user.roll_number}`, 20, 75);
        doc.text(`Amount Paid: Rs. ${amount}`, 20, 85);
        doc.text(`Payment Mode: Online`, 20, 95);
        doc.text(`Transaction ID: ${txid}`, 20, 105);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 115);
        doc.text("------------------------------------------", 20, 125);
        doc.text("Thank you for your payment!", 20, 140);
        doc.save(`${user.name}_Receipt.pdf`);
    }
</script>
</body>
</html>
